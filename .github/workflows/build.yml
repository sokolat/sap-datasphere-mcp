name: Build MCP Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Output image URL
        run: |
          echo "### 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull command:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  test:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test CLI in container
        env:
          DATASPHERE_BASE_URL: ${{ secrets.DATASPHERE_BASE_URL }}
          DATASPHERE_CLIENT_ID: ${{ secrets.DATASPHERE_CLIENT_ID }}
          DATASPHERE_CLIENT_SECRET: ${{ secrets.DATASPHERE_CLIENT_SECRET }}
          DATASPHERE_TOKEN_URL: ${{ secrets.DATASPHERE_TOKEN_URL }}
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          IMAGE="ghcr.io/${{ github.repository }}:latest"

          echo "=== Node.js version ==="
          docker run --rm --entrypoint node $IMAGE --version

          echo "=== Datasphere CLI version ==="
          docker run --rm --entrypoint datasphere $IMAGE --version

          echo "=== Python server imports ==="
          docker run --rm --entrypoint python $IMAGE -c "import sap_datasphere_mcp_server; print('OK')"

          echo "=== Test CLI with auth: list task chains ==="
          docker run --rm \
            -e "DATASPHERE_BASE_URL" \
            -e "DATASPHERE_CLIENT_ID" \
            -e "DATASPHERE_CLIENT_SECRET" \
            -e "DATASPHERE_TOKEN_URL" \
            $IMAGE sh -c 'datasphere objects task-chains list --space DW_SYNTAX --host "$DATASPHERE_BASE_URL" --top 5'
